steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/skywin-bill:$COMMIT_SHA
      - .
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - gcr.io/$PROJECT_ID/skywin-bill:$COMMIT_SHA
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - skywin-bill
      - --image
      - gcr.io/$PROJECT_ID/skywin-bill:$COMMIT_SHA
      - --region
      - asia-south1
      - --platform
      - managed
      - --allow-unauthenticated
      - --set-secrets
      - DATABASE_URL=skywin-database-url:latest
images:
  - gcr.io/$PROJECT_ID/skywin-bill:$COMMIT_SHA
